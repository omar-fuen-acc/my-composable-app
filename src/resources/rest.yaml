rest:
  - service: "http.flow.adapter"
    methods: ['GET']
    url: "/api/hello"
    flow: 'hello-world'
    timeout: 10s
    tracing: true

  - service: "http.flow.adapter"
    methods: ['GET']
    url: "/api/products"
    flow: 'get-products'
    timeout: 10s
    tracing: true

cors:
  - id: cors_1
    options:
      - "Access-Control-Allow-Origin: *"
      - "Access-Control-Allow-Methods: GET, OPTIONS"
      - "Access-Control-Allow-Headers: Origin, Content-Type"
    headers:
      - "Access-Control-Allow-Origin: *"
      - "Access-Control-Allow-Methods: GET, OPTIONS"
      - "Access-Control-Allow-Headers: Origin, Content-Type"
